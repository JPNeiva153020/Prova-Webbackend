# Configurações de conexão direta com o PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5432/sistema_academico
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# O banco é criado pelo script sistema_academico.sql.
# Com ddl-auto=none, o Hibernate apenas mapeia as tabelas existentes.
spring.jpa.hibernate.ddl-auto=none
spring.jpa.open-in-view=false
