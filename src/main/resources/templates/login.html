<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Login — Sistema Acadêmico</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div class="login-wrapper">
    <div class="login-card">

        <a href="/" class="logo">
            <span class="logo-icon">SA</span>
            <span>Sistema Acadêmico</span>
        </a>

        <h1>Acesso restrito</h1>
        <p class="subtitle">Faça login com sua conta de administrador.</p>

        <!-- Mensagem de erro -->
        <div class="alert alert-danger" th:if="${param.erro}">
            Usuário ou senha incorretos. Tente novamente.
        </div>

        <!-- Mensagem de logout -->
        <div class="alert alert-success" th:if="${param.logout}">
            Você saiu do sistema com sucesso.
        </div>

        <!--
            O Spring Security intercepta o POST em /login automaticamente.
            Ele pega os campos "username" e "password", busca o usuário pelo
            AdminUserDetailsService, criptografa a senha informada com BCrypt
            e compara com o hash salvo no banco.
        -->
        <form class="form" th:action="@{/login}" method="post">

            <div class="form-group">
                <label for="username">Usuário</label>
                <input id="username" type="text" name="username"
                       placeholder="admin" required autofocus>
            </div>

            <div class="form-group">
                <label for="password">Senha</label>
                <input id="password" type="password" name="password"
                       placeholder="••••••••" required>
            </div>

            <div class="form-actions">
                <button type="submit" class="btn btn-primary">Entrar</button>
            </div>

        </form>
    </div>
</div>
</body>
</html>
