<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Cadastrar Matéria</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<div class="page">

    <nav class="navbar">
        <a href="/" class="logo">
            <span class="logo-icon">SA</span>
            <span>Sistema Acadêmico</span>
        </a>

        <div class="nav-links">
            <a href="/">Home</a>
            <a href="/alunos">Alunos</a>
            <a href="/materias">Matérias</a>
            <a href="/turmas">Turmas</a>
            <form th:action="@{/logout}" method="post">
                <button type="submit" class="btn btn-secondary">Sair</button>
            </form>
        </div>
    </nav>

    <main class="container">

        <div class="page-header">
            <div class="page-title">
                <h1>Cadastrar matéria</h1>
                <p>Informe o código da matéria e descreva sua ementa.</p>
            </div>

            <a href="/materias" class="btn btn-secondary">Voltar</a>
        </div>

        <section class="panel">
            <form class="form" th:action="@{/materias/salvar}" th:object="${materia}" method="post">

                <div class="form-group">
                    <label>Código</label>
                    <input type="text" th:field="*{codigo}" placeholder="Ex: MAT001" required>
                </div>

                <div class="form-group">
                    <label>Ementa</label>
                    <textarea th:field="*{ementa}" placeholder="Digite a ementa da matéria..." required></textarea>
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn btn-primary">Salvar matéria</button>
                    <a href="/materias" class="btn btn-secondary">Cancelar</a>
                </div>

            </form>
        </section>

    </main>

</div>

</body>
</html>
