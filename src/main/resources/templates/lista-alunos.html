<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Alunos</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<div class="page">

    <nav class="navbar">
        <a href="/" class="logo">
            <span class="logo-icon">🎓</span>
            <span>Sistema Acadêmico</span>
        </a>

        <div class="nav-links">
            <a href="/">Home</a>
            <a href="/alunos">Alunos</a>
            <a href="/materias">Matérias</a>
            <a href="/turmas">Turmas</a>
        </div>
    </nav>

    <main class="container">

        <div class="page-header">
            <div class="page-title">
                <h1>Alunos</h1>
                <p>Lista de alunos cadastrados no sistema.</p>
            </div>

            <a href="/alunos/novo" class="btn btn-primary">+ Novo aluno</a>
        </div>

        <section class="panel">
            <div class="table-wrapper">
                <table>
                    <thead>
                    <tr>
                        <th>Matrícula</th>
                        <th>Nome</th>
                        <th>Endereço</th>
                        <th>Data de ingresso</th>
                        <th>Ações</th>
                    </tr>
                    </thead>

                    <tbody>
                    <tr th:each="aluno : ${listaAlunos}">
                        <td th:text="${aluno.matricula}"></td>
                        <td th:text="${aluno.nome}"></td>
                        <td th:text="${aluno.endereco}"></td>
                        <td th:text="${aluno.dataIngresso}"></td>
                        <td>
                            <div class="actions">
                                <a class="btn btn-danger"
                                   th:href="@{/alunos/deletar/{matricula}(matricula=${aluno.matricula})}"
                                   data-confirm-delete="Tem certeza que deseja remover este aluno?">
                                    Remover
                                </a>
                                <a class="btn btn-primary" th:href="@{/alunos/{matricula}/boletim(matricula=${aluno.matricula})}">
                                    Ver Matérias e Média
                                </a>
                            </div>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>

            <div class="empty" th:if="${#lists.isEmpty(listaAlunos)}">
                Nenhum aluno cadastrado ainda.
            </div>
        </section>

    </main>

</div>

<script src="/js/app.js"></script>
</body>
</html>
