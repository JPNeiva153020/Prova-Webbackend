<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Turmas</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<div class="page">

    <nav class="navbar">
        <a href="/" class="logo">
            <span class="logo-icon">SA</span>
            <span>Sistema Acadêmico</span>
        </a>

        <div class="nav-links">
            <a href="/">Home</a>
            <a href="/alunos">Alunos</a>
            <a href="/materias">Matérias</a>
            <a href="/turmas">Turmas</a>
            <form th:action="@{/logout}" method="post">
                <button type="submit" class="btn btn-secondary">Sair</button>
            </form>
        </div>
    </nav>

    <main class="container">

        <div class="page-header">
            <div class="page-title">
                <h1>Turmas</h1>
                <p>Visualize turmas cadastradas e acesse alunos e notas.</p>
            </div>

            <div class="actions">
                <a href="/turmas/notas" class="btn btn-secondary">Consultar notas</a>
                <a href="/turmas/novo" class="btn btn-primary">+ Nova turma</a>
            </div>
        </div>

        <div class="alert alert-success page-alert" th:if="${sucesso}" th:text="${sucesso}"></div>
        <div class="alert alert-danger page-alert" th:if="${erro}" th:text="${erro}"></div>

        <section class="panel">
            <div class="table-wrapper">
                <table>
                    <thead>
                    <tr>
                        <th>Código</th>
                        <th>Curso</th>
                        <th>Período</th>
                        <th>Turno</th>
                        <th>Campus</th>
                        <th>Matérias vinculadas</th>
                        <th>Ações</th>
                    </tr>
                    </thead>

                    <tbody>
                    <tr th:each="turma : ${listaTurmas}">
                        <td th:text="${turma.codigo}"></td>
                        <td th:text="${turma.curso} ?: '-'"></td>
                        <td th:text="${turma.periodo} ?: '-'"></td>
                        <td th:text="${turma.turno} ?: '-'"></td>
                        <td th:text="${turma.campus} ?: '-'"></td>
                        <td class="text-cell" th:text="${turma.materiasResumo}"></td>
                        <td class="actions-cell">
                            <div class="actions table-actions">
                                <a class="btn btn-secondary"
                                   th:href="@{/turmas/{codigo}/materias(codigo=${turma.codigo})}">
                                    Ver matérias
                                </a>
                                <a class="btn btn-primary"
                                   th:href="@{/turmas/{codigo}/matriculas(codigo=${turma.codigo})}">
                                    Alunos e notas
                                </a>

                                <a class="btn btn-danger"
                                   th:href="@{/turmas/deletar/{codigo}(codigo=${turma.codigo})}">
                                    Remover
                                </a>
                            </div>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>

            <div class="empty" th:if="${#lists.isEmpty(listaTurmas)}">
                Nenhuma turma cadastrada ainda.
            </div>
        </section>

    </main>

</div>

</body>
</html>
