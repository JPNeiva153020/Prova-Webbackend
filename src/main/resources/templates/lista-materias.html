<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Matérias</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<div class="page">

    <nav class="navbar">
        <a href="/" class="logo">
            <span class="logo-icon">🎓</span>
            <span>Sistema Acadêmico</span>
        </a>

        <div class="nav-links">
            <a href="/">Home</a>
            <a href="/alunos">Alunos</a>
            <a href="/materias">Matérias</a>
            <a href="/turmas">Turmas</a>
        </div>
    </nav>

    <main class="container">

        <div class="page-header">
            <div class="page-title">
                <h1>Matérias</h1>
                <p>Gerencie as matérias e suas respectivas ementas.</p>
            </div>

            <a href="/materias/novo" class="btn btn-primary">+ Nova matéria</a>
        </div>

        <section class="panel">
            <div class="table-wrapper">
                <table>
                    <thead>
                    <tr>
                        <th>Código</th>
                        <th>Ementa</th>
                        <th>Ações</th>
                    </tr>
                    </thead>

                    <tbody>
                    <tr th:each="materia : ${listaMaterias}">
                        <td th:text="${materia.codigo}"></td>
                        <td th:text="${materia.ementa}"></td>
                        <td>
                            <div class="actions">
                                <a class="btn btn-danger"
                                   th:href="@{/materias/deletar/{codigo}(codigo=${materia.codigo})}"
                                   data-confirm-delete="Tem certeza que deseja remover esta matéria?">
                                    Remover
                                </a>
                            </div>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>

            <div class="empty" th:if="${#lists.isEmpty(listaMaterias)}">
                Nenhuma matéria cadastrada ainda.
            </div>
        </section>

    </main>

</div>

<script src="/js/app.js"></script>
</body>
</html>
