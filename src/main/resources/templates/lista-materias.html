<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Matérias</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<div class="page">

    <nav class="navbar">
        <a href="/" class="logo">
            <span class="logo-icon">SA</span>
            <span>Sistema Acadêmico</span>
        </a>

        <div class="nav-links">
            <a href="/">Home</a>
            <a href="/alunos">Alunos</a>
            <a href="/materias">Matérias</a>
            <a href="/turmas">Turmas</a>
            <form th:action="@{/logout}" method="post">
                <button type="submit" class="btn btn-secondary">Sair</button>
            </form>
        </div>
    </nav>

    <main class="container">

        <div class="page-header">
            <div class="page-title">
                <h1>Matérias</h1>
                <p>Gerencie disciplinas, carga horária, ementa e vínculos com turmas.</p>
            </div>

            <a href="/materias/novo" class="btn btn-primary">+ Nova matéria</a>
        </div>

        <div class="alert alert-success page-alert" th:if="${sucesso}" th:text="${sucesso}"></div>
        <div class="alert alert-danger page-alert" th:if="${erro}" th:text="${erro}"></div>

        <section class="panel">
            <div class="table-wrapper">
                <table>
                    <thead>
                    <tr>
                        <th>Código</th>
                        <th>Nome</th>
                        <th>Carga horária</th>
                        <th>Ementa</th>
                        <th>Ações</th>
                    </tr>
                    </thead>

                    <tbody>
                    <tr th:each="materia : ${listaMaterias}">
                        <td th:text="${materia.codigo}"></td>
                        <td th:text="${materia.nomeExibicao}"></td>
                        <td th:text="${materia.cargaHoraria} ?: '-'"></td>
                        <td class="text-cell" th:text="${materia.ementa}"></td>
                        <td class="actions-cell">
                            <div class="actions table-actions">
                                <a class="btn btn-primary"
                                   th:href="@{/materias/{codigo}/detalhes(codigo=${materia.codigo})}">
                                    Ver turmas e alunos
                                </a>
                                <a class="btn btn-danger"
                                   th:href="@{/materias/deletar/{codigo}(codigo=${materia.codigo})}">
                                    Remover
                                </a>
                            </div>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>

            <div class="empty" th:if="${#lists.isEmpty(listaMaterias)}">
                Nenhuma matéria cadastrada ainda.
            </div>
        </section>

    </main>

</div>

</body>
</html>
