<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Cadastrar Aluno</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<div class="page">

    <nav class="navbar">
        <a href="/" class="logo">
            <span class="logo-icon">SA</span>
            <span>Sistema Acadêmico</span>
        </a>

        <div class="nav-links">
            <a href="/">Home</a>
            <a href="/alunos">Alunos</a>
            <a href="/materias">Matérias</a>
            <a href="/turmas">Turmas</a>
            <form th:action="@{/logout}" method="post">
                <button type="submit" class="btn btn-secondary">Sair</button>
            </form>
        </div>
    </nav>

    <main class="container">

        <div class="page-header">
            <div class="page-title">
                <h1>Cadastrar aluno</h1>
                <p>Preencha os dados abaixo para registrar um novo aluno.</p>
            </div>

            <a href="/alunos" class="btn btn-secondary">Voltar</a>
        </div>

        <section class="panel">
            <form class="form" th:action="@{/alunos/salvar}" th:object="${aluno}" method="post">

                <div class="form-group">
                    <label>Matrícula</label>
                    <input type="text" th:field="*{matricula}" placeholder="Ex: 2024001" required>
                </div>

                <div class="form-group">
                    <label>Nome</label>
                    <input type="text" th:field="*{nome}" placeholder="Ex: João Silva" required>
                </div>

                <div class="form-group">
                    <label>Endereço</label>
                    <input type="text" th:field="*{endereco}" placeholder="Ex: Rua A, 123" required>
                </div>

                <div class="form-group">
                    <label>Data de ingresso</label>
                    <input type="date" th:field="*{dataIngresso}" required>
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn btn-primary">Salvar aluno</button>
                    <a href="/alunos" class="btn btn-secondary">Cancelar</a>
                </div>

            </form>
        </section>

    </main>

</div>

</body>
</html>
