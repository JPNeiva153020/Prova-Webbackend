<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Cadastrar Turma</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<div class="page">

    <nav class="navbar">
        <a href="/" class="logo">
            <span class="logo-icon">🎓</span>
            <span>Sistema Acadêmico</span>
        </a>

        <div class="nav-links">
            <a href="/">Home</a>
            <a href="/alunos">Alunos</a>
            <a href="/materias">Matérias</a>
            <a href="/turmas">Turmas</a>
        </div>
    </nav>

    <main class="container">

        <div class="page-header">
            <div class="page-title">
                <h1>Cadastrar turma</h1>
                <p>Crie uma turma e vincule ela a uma matéria já cadastrada.</p>
            </div>

            <a href="/turmas" class="btn btn-secondary">Voltar</a>
        </div>

        <section class="panel">
            <form class="form" th:action="@{/turmas/salvar}" th:object="${turma}" method="post">

                <div class="form-group">
                    <label>Código da turma</label>
                    <input type="text" th:field="*{codigo}" placeholder="Ex: T001" required>
                </div>

                <div class="form-group">
                    <label>Matéria</label>
                    <select th:field="*{materiaCodigo}" required>
                        <option value="">Selecione uma matéria</option>

                        <option th:each="materia : ${listaMaterias}"
                                th:value="${materia.codigo}"
                                th:text="${materia.codigo} + ' - ' + ${materia.ementa}">
                        </option>
                    </select>
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn btn-primary">Salvar turma</button>
                    <a href="/turmas" class="btn btn-secondary">Cancelar</a>
                </div>

            </form>
        </section>

    </main>

</div>

<script src="/js/app.js"></script>
</body>
</html>
