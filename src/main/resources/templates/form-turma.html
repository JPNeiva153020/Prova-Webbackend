<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Cadastrar Turma</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<div class="page">

    <nav class="navbar">
        <a href="/" class="logo">
            <span class="logo-icon">SA</span>
            <span>Sistema Acadêmico</span>
        </a>

        <div class="nav-links">
            <a href="/">Home</a>
            <a href="/alunos">Alunos</a>
            <a href="/materias">Matérias</a>
            <a href="/turmas">Turmas</a>
            <form th:action="@{/logout}" method="post">
                <button type="submit" class="btn btn-secondary">Sair</button>
            </form>
        </div>
    </nav>

    <main class="container">

        <div class="page-header">
            <div class="page-title">
                <h1>Cadastrar turma</h1>
                <p>Crie uma turma com curso, período, turno e campus.</p>
            </div>

            <a href="/turmas" class="btn btn-secondary">Voltar</a>
        </div>

        <section class="panel">
            <form class="form" th:action="@{/turmas/salvar}" th:object="${turma}" method="post">

                <div class="form-grid">
                    <div class="form-group">
                        <label>Código da turma</label>
                        <input type="text" th:field="*{codigo}" placeholder="Ex: CCO-2026-1A" required>
                    </div>

                    <div class="form-group">
                        <label>Curso</label>
                        <input type="text" th:field="*{curso}" placeholder="Ex: Ciência da Computação">
                    </div>

                    <div class="form-group">
                        <label>Período</label>
                        <input type="text" th:field="*{periodo}" placeholder="Ex: 1º Período">
                    </div>

                    <div class="form-group">
                        <label>Turno</label>
                        <input type="text" th:field="*{turno}" placeholder="Ex: Manhã">
                    </div>

                    <div class="form-group">
                        <label>Campus</label>
                        <input type="text" th:field="*{campus}" placeholder="Ex: Campus Farolândia">
                    </div>
                </div>

                <div class="form-group">
                    <label>Matéria inicial</label>
                    <select th:field="*{materiaCodigo}">
                        <option value="">Criar turma sem matéria por enquanto</option>

                        <option th:each="materia : ${listaMaterias}"
                                th:value="${materia.codigo}"
                                th:text="${materia.resumo}">
                        </option>
                    </select>
                    <small class="help-text">Depois você pode vincular outras matérias pela tela da turma.</small>
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn btn-primary">Salvar turma</button>
                    <a href="/turmas" class="btn btn-secondary">Cancelar</a>
                </div>

            </form>
        </section>

    </main>

</div>

</body>
</html>
